apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pacs-ingress
  namespace: pacs
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.allow-http: "true"
    # 不設定 static-ip-name → GKE 自動分配動態 IP
spec:
  rules:
  - http:
      paths:
      # Access API (write path)
      - path: /v1/swipe
        pathType: Prefix
        backend:
          service:
            name: access-api
            port:
              number: 8080
      # Reporting API (all read endpoints)
      - path: /v1/reports
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      - path: /v1/audit
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      - path: /v1/alerts
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      - path: /v1/dev
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      # Frontend (catch-all, must be last)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
