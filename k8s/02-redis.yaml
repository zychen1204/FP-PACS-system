apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: pacs
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
          - redis-server
          - /etc/redis/redis.conf
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
      - name: redis-config
        configMap:
          name: redis-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: pacs
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard-rwo   # GKE standard SSD
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: pacs
data:
  redis.conf: |
    # 持久化設定
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    # RDB 備份
    save 900 1
    save 300 10
    save 60 10000

    # 記憶體限制
    maxmemory 768mb
    maxmemory-policy allkeys-lru

    # 效能
    hz 20
    dynamic-hz yes

    # 連線
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # Streams（供 Redis Stream 事件佇列使用）
    stream-node-max-bytes 4096
    stream-node-max-entries 100
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: pacs
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  type: ClusterIP
