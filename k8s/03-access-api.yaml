apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-api
  namespace: pacs
  labels:
    app: access-api
    version: v2
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # Zero-downtime 部署
  selector:
    matchLabels:
      app: access-api
  template:
    metadata:
      labels:
        app: access-api
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pacs-sa
      terminationGracePeriodSeconds: 30
      containers:
      - name: access-api
        image: gcr.io/extreme-water-497313-j8/pacs-access-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: SERVICE
          value: "access-api"
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: PORT
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: LOG_LEVEL


        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
          timeoutSeconds: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]  # 讓 LB 先移除，再停止接收
---
# ── ClusterIP Service（僅叢集內部 + Ingress 存取）────────────
apiVersion: v1
kind: Service
metadata:
  name: access-api
  namespace: pacs
  labels:
    app: access-api
spec:
  selector:
    app: access-api
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  type: ClusterIP           # 不對外暴露，由 Ingress 控制
---
# ── HPA：根據 CPU + 記憶體自動擴縮 ──────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: access-api-hpa
  namespace: pacs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: access-api
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65    # 尖峰時提早擴縮
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15   # 快速回應 burst 流量
      policies:
      - type: Pods
        value: 3
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 分鐘穩定後才縮
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
