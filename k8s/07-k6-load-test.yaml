apiVersion: batch/v1
kind: Job
metadata:
  name: k6-shift-burst
  namespace: pacs
  labels:
    app: k6-load-test
    scenario: shift_burst
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-load-test
        scenario: shift_burst
    spec:
      restartPolicy: Never
      containers:
      - name: k6
        image: grafana/k6:0.50.0
        args: ["run", "/scripts/shift_burst.js"]
        env:
        - name: ACCESS_API
          value: "http://access-api:8080"
        - name: REPORT_API
          value: "http://reporting-api:8081"
        - name: BADGE_COUNT
          value: "1000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: pacs-k6-scripts
          items:
          - key: shift_burst.js
            path: shift_burst.js
          - key: steady_baseline.js
            path: steady_baseline.js
          - key: mixed_read_write.js
            path: mixed_read_write.js
          - key: badges.js
            path: lib/badges.js
          - key: apb_safe.js
            path: lib/apb_safe.js
