apiVersion: batch/v1
kind: Job
metadata:
  name: k6-shift-burst
  namespace: pacs
  labels:
    app: k6-load-test
    scenario: shift_burst
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-load-test
        scenario: shift_burst
    spec:
      restartPolicy: Never
      containers:
      - name: k6
        image: grafana/k6:0.50.0
        args: ["run", "/scripts/shift_burst.js"]
        env:
        - name: ACCESS_API
          value: "http://access-api:8080"
        - name: REPORT_API
          value: "http://reporting-api:8081"
        - name: BADGE_COUNT
          value: "1000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: pacs-k6-scripts
---
# ConfigMap 由 deploy-to-gke.sh 自動填入 scripts/k6-load-test/ 的內容；
# 本機可手動建立：
#   kubectl create configmap pacs-k6-scripts -n pacs \
#     --from-file=scripts/k6-load-test/ \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: ConfigMap
metadata:
  name: pacs-k6-scripts
  namespace: pacs
data:
  placeholder: "run deploy-to-gke.sh or kubectl create configmap"
