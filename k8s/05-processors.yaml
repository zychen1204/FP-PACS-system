apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-processor
  namespace: pacs
  labels:
    app: event-processor
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: event-processor
  template:
    metadata:
      labels:
        app: event-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pacs-sa
      terminationGracePeriodSeconds: 60   # 讓 Stream consumer 有時間 commit
      containers:
      - name: event-processor
        image: asia-east1-docker.pkg.dev/extreme-water-497313-j8/pacs/event-processor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
          name: health
        env:
        - name: SERVICE
          value: "event-processor"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_PORT
        - name: DB_HOST
          value: "127.0.0.1"
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
        - name: HEALTH_PORT
          value: "8082"
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2
      # ── Cloud SQL Proxy Sidecar ──────────────────────────
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        args:
        - "--structured-logs"
        - "--port=5432"
        - "$(CLOUD_SQL_INSTANCE)"
        env:
        - name: CLOUD_SQL_INSTANCE
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: CLOUD_SQL_INSTANCE
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
# ── event-processor HPA ──────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: event-processor-hpa
  namespace: pacs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: event-processor
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Stream 堆積時快速擴縮
    scaleDown:
      stabilizationWindowSeconds: 300
---
