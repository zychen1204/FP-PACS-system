apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: pacs-managed-cert
  namespace: pacs
spec:
  domains:
  - DOMAIN_NAME
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: pacs-frontend-config
  namespace: pacs
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: PERMANENT_REDIRECT
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pacs-ingress
  namespace: pacs
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.allow-http: "true"
    kubernetes.io/ingress.global-static-ip-name: STATIC_IP_NAME
    networking.gke.io/managed-certificates: pacs-managed-cert
    networking.gke.io/v1beta1.FrontendConfig: pacs-frontend-config
spec:
  rules:
  - host: DOMAIN_NAME
    http:
      paths:
      # Access API (write path)
      - path: /v1/swipe
        pathType: Prefix
        backend:
          service:
            name: access-api
            port:
              number: 8080
      # Reporting API (all read endpoints)
      - path: /v1/reports
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      - path: /v1/audit
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      - path: /v1/alerts
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      - path: /v1/dev
        pathType: Prefix
        backend:
          service:
            name: reporting-api
            port:
              number: 8081
      # Frontend (catch-all, must be last)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
