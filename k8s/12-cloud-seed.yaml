# ============================================================
# 12-cloud-seed.yaml
#
# 手動執行 90,000 人 PostgreSQL 資料播種：
#   kubectl delete job pacs-cloud-seed -n pacs --ignore-not-found
#   kubectl apply -f k8s/12-cloud-seed.yaml
#   kubectl logs -f job/pacs-cloud-seed -n pacs
#
# 需求：
#   - deploy-to-gke.sh 已建立 pacs-cloud-seed-sql ConfigMap
#   - GKE/Kubernetes 支援 restartable init sidecar (1.29+)
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: pacs-cloud-seed
  namespace: pacs
  labels:
    app: pacs-cloud-seed
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: pacs-sa
      restartPolicy: Never
      initContainers:
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        restartPolicy: Always
        args:
        - "--structured-logs"
        - "--port=5432"
        - "$(CLOUD_SQL_INSTANCE)"
        env:
        - name: CLOUD_SQL_INSTANCE
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: CLOUD_SQL_INSTANCE
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h 127.0.0.1 -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do
            echo "waiting for Cloud SQL proxy..."
            sleep 2
          done
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
      containers:
      - name: seed
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          set -eu
          psql -v ON_ERROR_STOP=1 \
            -h 127.0.0.1 -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" \
            -f /seed/0104_cloud_seed.up.sql
          psql -v ON_ERROR_STOP=1 \
            -h 127.0.0.1 -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" \
            -c "ANALYZE employees; SELECT job_level, COUNT(*) FROM employees WHERE is_active GROUP BY job_level ORDER BY job_level;"
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: cloud-seed-sql
          mountPath: /seed
          readOnly: true
      volumes:
      - name: cloud-seed-sql
        configMap:
          name: pacs-cloud-seed-sql
