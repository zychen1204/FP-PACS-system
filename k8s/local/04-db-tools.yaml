apiVersion: v1
kind: Pod
metadata:
  name: db-tools
  namespace: pacs
  labels:
    app: db-tools
spec:
  restartPolicy: Always
  containers:
  - name: psql
    image: postgres:16-alpine
    command:
    - sh
    - -c
    - |
      echo "db-tools ready. Run: psql -v ON_ERROR_STOP=1 -f /cloud-seed/0104_cloud_seed.up.sql"
      trap : TERM INT
      sleep infinity & wait
    env:
    - name: PGHOST
      valueFrom:
        configMapKeyRef:
          name: pacs-config
          key: DB_HOST
    - name: PGPORT
      valueFrom:
        configMapKeyRef:
          name: pacs-config
          key: DB_PORT
    - name: PGUSER
      valueFrom:
        configMapKeyRef:
          name: pacs-config
          key: DB_USER
    - name: PGDATABASE
      valueFrom:
        configMapKeyRef:
          name: pacs-config
          key: DB_NAME
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: pacs-secrets
          key: DB_PASSWORD
    volumeMounts:
    - name: cloud-seed-sql
      mountPath: /cloud-seed
      readOnly: true
  volumes:
  - name: cloud-seed-sql
    configMap:
      name: pacs-cloud-seed-sql
