apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-api
  namespace: pacs
  labels:
    app: access-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: access-api
  template:
    metadata:
      labels:
        app: access-api
    spec:
      serviceAccountName: pacs-sa
      containers:
      - name: access-api
        image: pacs-access-api:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_PORT
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: access-api
  namespace: pacs
spec:
  selector:
    app: access-api
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-processor
  namespace: pacs
  labels:
    app: event-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-processor
  template:
    metadata:
      labels:
        app: event-processor
    spec:
      serviceAccountName: pacs-sa
      containers:
      - name: event-processor
        image: pacs-event-processor:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
          name: health
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: REDIS_PORT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
        - name: HEALTH_PORT
          value: "8082"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
---
