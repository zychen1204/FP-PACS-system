apiVersion: v1
kind: Namespace
metadata:
  name: pacs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pacs-sa
  namespace: pacs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pacs-config
  namespace: pacs
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "pacs_user"
  DB_NAME: "pacs_db"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: pacs-secrets
  namespace: pacs
type: Opaque
stringData:
  DB_PASSWORD: "pacs_password"
  JWT_SECRET: "local-dev-only-change-me"
