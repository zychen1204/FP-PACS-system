# ============================================================
# 06-migrations.yaml
#
# GKE 上的 Migration 策略：
#   - Job 掛載 initContainer，從 ConfigMap 寫出 SQL 檔案
#   - 使用 migrate CLI 執行 up 到最新版（0102）
#   - 0103 大規模 seed 手動執行（避免 Job 超時）
#
# 手動執行 0103 seed：
#   kubectl exec -it -n pacs deploy/access-api -- \
#     sh -c "apt-get install -y postgresql-client && \
#     psql \$DATABASE_URL < /migrations/0103_large_scale_seeding.up.sql"
#
#   或直接用 Cloud SQL Auth Proxy：
#   gcloud sql connect INSTANCE_NAME --user=pacs_user --database=pacs_db \
#     < scripts/migrations/0103_large_scale_seeding.up.sql
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: pacs-migrations
  namespace: pacs
  labels:
    app: pacs-migrations
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 86400  # 24 小時後自動清除
  template:
    spec:
      serviceAccountName: pacs-sa
      restartPolicy: Never
      initContainers:
      # initContainer：把 ConfigMap 裡的 SQL 寫入共享 volume
      - name: migration-loader
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "📦 載入 migration 檔案..."
          cp /sql-source/*.sql /migrations/ 2>/dev/null || true
          ls -la /migrations/
          echo "✅ 載入完成"
        volumeMounts:
        - name: sql-source
          mountPath: /sql-source
        - name: migration-files
          mountPath: /migrations
      containers:
      - name: migrate
        image: migrate/migrate:v4.17.1
        command:
        - migrate
        - -path=/migrations
        - -database=postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable
        - up
        - "102"           # 只跑到 0102；0103 大規模 seed 手動執行
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: DB_HOST
          value: "127.0.0.1"    # Cloud SQL Proxy sidecar
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: migration-files
          mountPath: /migrations
      # ── Cloud SQL Proxy Sidecar ──────────────────────────
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        args:
        - "--structured-logs"
        - "--port=5432"
        - "$(CLOUD_SQL_INSTANCE)"
        env:
        - name: CLOUD_SQL_INSTANCE
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: CLOUD_SQL_INSTANCE
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: sql-source
        configMap:
          name: pacs-migration-sql
      - name: migration-files
        emptyDir: {}
---
# ── SQL ConfigMap（含實際 migration 檔案）────────────────────
# 由 deploy-to-gke.sh 動態建立（從 scripts/migrations/ 讀入）
# 這裡只是結構說明，實際內容由 kustomize 或 deploy script 填入
apiVersion: v1
kind: ConfigMap
metadata:
  name: pacs-migration-sql
  namespace: pacs
  annotations:
    note: "此 ConfigMap 由 deploy-to-gke.sh 自動填入 SQL 內容"
data:
  # 由 deploy-to-gke.sh 執行以下命令填入：
  # kubectl create configmap pacs-migration-sql \
  #   --from-file=scripts/migrations/ \
  #   -n pacs --dry-run=client -o yaml | kubectl apply -f -
  placeholder: "run deploy-to-gke.sh to populate"
