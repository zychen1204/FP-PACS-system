# ============================================================
# 06-migrations.yaml
#
# GKE 上的 Migration 策略：
#   - Job 掛載 initContainer，從 ConfigMap 寫出 SQL 檔案
#   - Cloud SQL Proxy 使用 Kubernetes restartable init sidecar，Job 可正常完成
#   - 使用 migrate CLI 執行 up 到最新版（0102）
#   - 大規模 cloud seed 由 k8s/12-cloud-seed.yaml 手動執行
#
# 手動執行 cloud seed：
#   kubectl delete job pacs-cloud-seed -n pacs --ignore-not-found
#   kubectl apply -f k8s/12-cloud-seed.yaml
#   kubectl logs -f job/pacs-cloud-seed -n pacs
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: pacs-migrations
  namespace: pacs
  labels:
    app: pacs-migrations
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 86400  # 24 小時後自動清除
  template:
    spec:
      serviceAccountName: pacs-sa
      restartPolicy: Never
      initContainers:
      # restartable init sidecar：Job 主容器完成後，Pod 會正常結束。
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        restartPolicy: Always
        args:
        - "--structured-logs"
        - "--port=5432"
        - "$(CLOUD_SQL_INSTANCE)"
        env:
        - name: CLOUD_SQL_INSTANCE
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: CLOUD_SQL_INSTANCE
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h 127.0.0.1 -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do
            echo "waiting for Cloud SQL proxy..."
            sleep 2
          done
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
      # initContainer：把 ConfigMap 裡的 SQL 寫入共享 volume
      - name: migration-loader
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "📦 載入 migration 檔案..."
          cp /sql-source/*.sql /migrations/ 2>/dev/null || true
          ls -la /migrations/
          echo "✅ 載入完成"
        volumeMounts:
        - name: sql-source
          mountPath: /sql-source
        - name: migration-files
          mountPath: /migrations
      containers:
      - name: migrate
        image: migrate/migrate:v4.17.1
        command:
        - migrate
        - -path=/migrations
        - -database=postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable
        - up
        - "102"           # 只跑到 0102；0103 大規模 seed 手動執行
        env:
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: pacs-config
              key: DB_PORT
        - name: DB_HOST
          value: "127.0.0.1"    # Cloud SQL Proxy sidecar
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pacs-secrets
              key: DB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: migration-files
          mountPath: /migrations
      volumes:
      - name: sql-source
        configMap:
          name: pacs-migration-sql
      - name: migration-files
        emptyDir: {}
