apiVersion: v1
kind: Pod
metadata:
  name: load-tester
  namespace: pacs
  labels:
    app: load-tester
spec:
  serviceAccountName: pacs-sa
  restartPolicy: Never
  containers:
  - name: load-tester
    image: golang:1.21-alpine
    workingDir: /app
    command:
    - sh
    - -c
    - |
      apk add --no-cache git
      go run . --mode cloud --days 7 --workers 50
    env:
    - name: GO111MODULE
      value: "on"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    volumeMounts:
    - name: load-gen-source
      mountPath: /app
  volumes:
  - name: load-gen-source
    configMap:
      name: pacs-load-gen-source
---
# 此 ConfigMap 由 deploy-to-gke.sh 自動填入 scripts/load-generator/ 的內容
apiVersion: v1
kind: ConfigMap
metadata:
  name: pacs-load-gen-source
  namespace: pacs
data:
  placeholder: "run deploy-to-gke.sh"
