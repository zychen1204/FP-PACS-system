version: '3.8'

services:
  # ─── Infrastructure ─────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pacs_user
      POSTGRES_PASSWORD: pacs_password
      POSTGRES_DB: pacs_db
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_min_duration_statement=100ms"
      - "-c"
      - "log_line_prefix=%t [%p]: db=%d,user=%u "
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacs_user -d pacs_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pacs-network

  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ./scripts/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://pacs_user:pacs_password@postgres:5432/pacs_db?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - pacs-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pacs-network

  # ─── Backend Microservices ──────────────────────────

  access-api:
    build:
      context: ./backend
      args:
        SERVICE: access-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pacs-network

  event-processor:
    build:
      context: ./backend
      args:
        SERVICE: event-processor
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pacs_user
      - DB_PASSWORD=pacs_password
      - DB_NAME=pacs_db
      - HEALTH_PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  reporting-api:
    build:
      context: ./backend
      args:
        SERVICE: reporting-api
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pacs_reporter
      - DB_PASSWORD=reporter_password
      - DB_NAME=pacs_db
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  # ─── Frontend ───────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - access-api
      - reporting-api
    networks:
      - pacs-network

volumes:
  pgdata:

networks:
  pacs-network:
    driver: bridge
