services:
  # ─── Infrastructure ─────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pacs_user
      POSTGRES_PASSWORD: pacs_password
      POSTGRES_DB: pacs_db
      # UTF-8 locale 讓 ltree label 在 PG16 接受中文（FR-6 ltree migration 依賴）
      LANG: C.UTF-8
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_min_duration_statement=100ms"
      - "-c"
      - "log_line_prefix=%t [%p]: db=%d,user=%u "
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacs_user -d pacs_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      pacs-network:
        # Phase 2 §5.3「Read Replica」demo simplification：
        # 本地 docker-compose 為簡化 demo，把 read 路徑指向同一 DB 並以
        # network alias `postgres-replica` 對外暴露；正式環境會用 Cloud SQL
        # HA Primary + Read Replica（streaming replication）。架構上保留
        # 「reporting-api → postgres-replica」的拓樸，未來只要把 alias 換
        # 成真正的 replica container 即可。
        aliases:
          - postgres-replica

  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ./scripts/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://pacs_user:pacs_password@postgres:5432/pacs_db?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - pacs-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pacs-network

  # ─── Backend Microservices ──────────────────────────

  access-api:
    build:
      context: ./backend
      args:
        SERVICE: access-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8080
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pacs-network

  event-processor:
    build:
      context: ./backend
      args:
        SERVICE: event-processor
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pacs_user
      - DB_PASSWORD=pacs_password
      - DB_NAME=pacs_db
      - HEALTH_PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  reporting-api:
    build:
      context: ./backend
      args:
        SERVICE: reporting-api
    ports:
      - "8081:8081"
    environment:
      # Phase 2 §5.3：read 路徑連 postgres-replica（demo 階段為 postgres alias）
      - DB_HOST=postgres-replica
      - DB_PORT=5432
      - DB_USER=pacs_reporter
      - DB_PASSWORD=reporter_password
      - DB_NAME=pacs_db
      - PORT=8081
      # FR-10：dev 環境 bypass JWT 讓 frontend 不需 token；
      # 演示完整 OIDC 流程時改設 DEV_AUTH_BYPASS=0 並用 /v1/dev/login 換 token。
      - DEV_AUTH_BYPASS=1
      - JWT_SECRET=dev-only-not-for-prod-change-me-please
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  anomaly-detector:
    build:
      context: ./backend
      args:
        SERVICE: anomaly-detector
    ports:
      - "8083:8083"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pacs_user
      - DB_PASSWORD=pacs_password
      - DB_NAME=pacs_db
      - HEALTH_PORT=8083
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  mv-refresher:
    build:
      context: ./backend
      args:
        SERVICE: mv-refresher
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      # mv-refresher 是 MV 擁有者（pacs_user 在 migrate 階段建 MV），
      # 用 pacs_user 才有權限 REFRESH。
      - DB_USER=pacs_user
      - DB_PASSWORD=pacs_password
      - DB_NAME=pacs_db
      - REFRESH_INTERVAL_SECONDS=300
      - HEALTH_PORT=8084
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  org-sync:
    build:
      context: ./backend
      args:
        SERVICE: org-sync
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=pacs_user
      - DB_PASSWORD=pacs_password
      - DB_NAME=pacs_db
      - SYNC_INTERVAL_SECONDS=1800
      - HEALTH_PORT=8085
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pacs-network

  # ─── Observability ──────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - access-api
    networks:
      - pacs-network

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/pacs-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - pacs-network

  # ─── Frontend ───────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - access-api
      - reporting-api
    networks:
      - pacs-network

volumes:
  pgdata:
  grafana-data:

networks:
  pacs-network:
    driver: bridge
