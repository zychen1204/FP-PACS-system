version: '3.8'

services:
  postgres-primary:
    image: postgres:15
    environment:
      POSTGRES_USER: pacs_user
      POSTGRES_PASSWORD: pacs_password
      POSTGRES_DB: pacs_db
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacs_user -d pacs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # In a real environment, this would be a separate server replicating from primary.
  # For local dev, we simulate it with another instance pointed to the same DB or just use primary.
  postgres-replica:
    image: postgres:15
    environment:
      POSTGRES_USER: pacs_user
      POSTGRES_PASSWORD: pacs_password
      POSTGRES_DB: pacs_db
    ports:
      - "5433:5432"
    depends_on:
      - postgres-primary

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pubsub:
    image: google/cloud-sdk:latest
    ports:
      - "8085:8085"
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=pacs-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]
      interval: 10s
      timeout: 5s
      retries: 5
