server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ @spa_fallback;
    }

    location @spa_fallback {
        root /usr/share/nginx/html;
        rewrite ^/?$ /index.html break;
        return 404;
    }

    # Access API
    location /v1/swipe {
        proxy_pass http://access-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/healthz {
        proxy_pass http://access-api:8080/healthz;
        proxy_set_header Host $host;
    }

    location /api/metrics {
        proxy_pass http://access-api:8080/metrics;
        proxy_set_header Host $host;
    }

    # Reporting API — 全部加上 Authorization 轉發
    location /v1/reports/ {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;  # ← 新增
    }

    location /v1/reports {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;  # ← 新增
    }

    location /v1/audit {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;  # ← 新增
    }

    location /v1/alerts {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;  # ← 新增
    }

    location /v1/dev {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # dev/login 本身不需要 token，但加上也無妨
    }

    location /api/report-healthz {
        proxy_pass http://reporting-api:8081/healthz;
        proxy_set_header Host $host;
    }
}