server {
    listen 80;
    server_name _;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        # 先尝试直接访问文件或目录
        try_files $uri $uri/ @spa_fallback;
    }

    # SPA 路由 fallback - 只对 / 根路径返回 index.html
    location @spa_fallback {
        root /usr/share/nginx/html;
        rewrite ^/?$ /index.html break;
        return 404;
    }

    # Proxy: Access API (Write Plane)
    location /v1/swipe {
        proxy_pass http://access-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Health check for Access API
    location /api/healthz {
        proxy_pass http://access-api:8080/healthz;
        proxy_set_header Host $host;
    }

    # Proxy: Metrics
    location /api/metrics {
        proxy_pass http://access-api:8080/metrics;
        proxy_set_header Host $host;
    }

    # Proxy: Reporting API (Read Plane)
    location /v1/reports/ {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/reports {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Audit trail
    location /v1/audit {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Alerts and demo login
    location /v1/alerts {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/dev {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Reporting health check
    location /api/report-healthz {
        proxy_pass http://reporting-api:8081/healthz;
        proxy_set_header Host $host;
    }
}
