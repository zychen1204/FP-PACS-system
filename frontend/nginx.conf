server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy: Access API (Write Plane)
    location /v1/swipe {
        proxy_pass http://access-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Health check for Access API
    location /api/healthz {
        proxy_pass http://access-api:8080/healthz;
        proxy_set_header Host $host;
    }

    # Proxy: Metrics
    location /api/metrics {
        proxy_pass http://access-api:8080/metrics;
        proxy_set_header Host $host;
    }

    # Proxy: Reporting API (Read Plane)
    location /v1/reports/ {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Audit trail
    location /v1/audit {
        proxy_pass http://reporting-api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Reporting health check
    location /api/report-healthz {
        proxy_pass http://reporting-api:8081/healthz;
        proxy_set_header Host $host;
    }
}
